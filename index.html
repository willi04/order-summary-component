<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <div class="container">
      <div class="box-1">
        <img src="./images/illustration-hero.svg" alt="" />
        <h2>Order Summary</h2>
        <div class="sub-box-1">
          <p>
            You can now listen to millions of songs,
            audiobooks, and podcasts on any device 
            anywhere you like!
          </p>
        </div>
      </div>
      <div class="box-2">
        <div><img src="./images/icon-music.svg" alt="" /></div>
        <div class="plan-text">
          <strong> Annual Plan </strong>
            <p>$59.99/year</p>
          </h6>
        </div>
        <div class="row-3"><a href="#">Change</a></div>
      </div>
      <div class="box-3">
        <a href="#">Proceed to Payment</a>
      </div>
      <div class="box-4"><a href="#">Cancel Order</a></div>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >.<br />
        Coded by <a href="#">Your Name Here</a>.
      </div>
    </div>
  </body>
</html>
